name: CI

on:
  push:
  pull_request:

jobs:
  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run package

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"

